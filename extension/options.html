<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>__MSG_configTitle__</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="options-body">
  <div class="options-container">
    <div class="header">
      <h1 class="logo">
        <span class="logo-icon">&#9670;</span>
        __MSG_configTitle__
      </h1>
      <p class="subtitle">__MSG_configSubtitle__</p>
    </div>

    <form id="configForm">
      <!-- Server -->
      <fieldset>
        <legend>__MSG_sectionServer__</legend>

        <div class="field">
          <label for="proxyHost">__MSG_fieldServerAddr__</label>
          <input type="text" id="proxyHost" placeholder="__MSG_phServerAddr__" />
          <span class="hint">__MSG_hintServerAddr__</span>
        </div>

        <div class="field">
          <label for="proxyPort">__MSG_fieldPort__</label>
          <input type="number" id="proxyPort" placeholder="__MSG_phPort__" min="1" max="65535" />
          <span class="hint">__MSG_hintPort__</span>
        </div>
      </fieldset>

      <!-- Network -->
      <fieldset>
        <legend>__MSG_sectionNetwork__</legend>

        <div class="field">
          <label for="mgmtCidr">__MSG_fieldCidr__</label>
          <input type="text" id="mgmtCidr" placeholder="__MSG_phCidr__" />
          <span class="hint">__MSG_hintCidr__</span>
        </div>

        <div class="field readonly">
          <label>__MSG_fieldMask__</label>
          <span id="maskDisplay">—</span>
        </div>
      </fieldset>

      <!-- Credentials -->
      <fieldset>
        <legend>__MSG_sectionCredentials__</legend>
        <p class="fieldset-desc">__MSG_sectionCredentialsDesc__</p>

        <div class="field">
          <label for="proxyUser">__MSG_fieldUsername__</label>
          <input type="text" id="proxyUser" placeholder="__MSG_phUsername__" />
        </div>

        <div class="field">
          <label for="proxyPass">__MSG_fieldPassword__</label>
          <input type="password" id="proxyPass" placeholder="__MSG_phPassword__" />
          <button type="button" class="btn btn-small" id="btnTogglePass">__MSG_btnShow__</button>
          <span class="hint">__MSG_hintPassword__</span>
        </div>
      </fieldset>

      <!-- Controls -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">__MSG_btnSave__</button>
        <button type="button" class="btn btn-secondary" id="btnReset">__MSG_btnReset__</button>
      </div>

      <div id="saveStatus" class="save-status" aria-live="polite"></div>
    </form>
  </div>
  <script src="options.js"></script>
</body>
</html>
